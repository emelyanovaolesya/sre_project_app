apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: postgres-podmonitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: db
  namespaceSelector:
    matchNames:
      - voting-app
  podMetricsEndpoints:
  - port: metrics
    path: /metrics
    interval: 30s